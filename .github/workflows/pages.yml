name: Deploy Web App to GitHub Pages

# Builds the self-contained standalone review page (dist/standalone) and
# publishes it to GitHub Pages so anyone can try the reviewer in a browser at
# https://<owner>.github.io/md-ai-reviewer/ — no install required.
#
# One-time setup: in the repo, go to Settings → Pages → "Build and deployment"
# and set Source to "GitHub Actions".
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Produces the offline-capable dist/standalone/index.html (JS + CSS inlined).
      - run: node esbuild.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/standalone

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
